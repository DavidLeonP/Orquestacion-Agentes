services:
  asistente:
    build: .
    container_name: asistente-ia-educacion
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      - ./data:/app/data:ro
      - asistente_storage:/app/storage
    restart: unless-stopped
    mem_limit: 700m
    networks:
      - asistente-net

  ui:
    build: .
    container_name: asistente-ia-ui
    command:
      [
        "streamlit",
        "run",
        "app_streamlit/Home.py",
        "--server.port=8501",
        "--server.address=0.0.0.0",
        "--server.headless=true",
        "--browser.gatherUsageStats=false",
      ]
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Desde el contenedor UI hacia el servicio API en la red Docker
      - STREAMLIT_API_BASE_URL=http://asistente:8000
    depends_on:
      - asistente
    restart: unless-stopped
    mem_limit: 400m
    networks:
      - asistente-net

volumes:
  asistente_storage:

networks:
  asistente-net:
